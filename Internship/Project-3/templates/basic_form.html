<!DOCTYPE html>
<html>
<head>
    <title>Student Database</title>
</head>

<body style="background-color:rgb(200,200,200)">

<h1>Student Database Management</h1>

<form action="/add" method="POST">

    <input
        type="text"
        name="name"
        placeholder="Enter Student Name"
        required>

    <button type="submit">
        Add Student
    </button>

</form>

<hr>

<h2>Student List</h2>

<table border="1">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Action</th>
</tr>

{% for student in students %}

<tr>

<td>{{ student[0] }}</td>

<td>{{ student[1] }}</td>

<td>
<a href="/delete/{{ student[0] }}">
Delete
</a>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
