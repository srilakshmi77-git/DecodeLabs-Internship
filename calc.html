<html>
     <head>
          <title>Calculator</title>
      </head>
      <style>
         table {
                        width:200px;
                        height:200px;
                        border-collapse:collapse;
                    }
       td {
                 padding:10px;
            }
       </style> 
      <body>
      <table border=1>
          <tr height=50px ><th colspan="5"><input type="text" id="screen" readonly></th></tr>
          <tr><td onclick="press('7')">7</td><td onclick="press('8')">8</td><td onclick="press('9')">9</td><td onclick="press('/')">/</td><td onclick="clearScreen()">c</td></tr>
          <tr><td onclick="press('4')">4</td><td onclick="press('5')">5</td><td onclick="press('6')">6</td><td onclick="press('*')">*</td><td onclick="press('(')">(</td></tr>
          <tr><td onclick="press('1')">1</td><td onclick="press('2')">2</td><td onclick="press('3')">3</td><td onclick="press('-')">-</td><td onclick="press(')')">)</td></tr>
          <tr><td onclick="press('0')">0</td><td onclick="press('00')">00</td><td onclick="press('.')">.</td><td onclick="press('+')">+</td><td onclick="calculate()">=</td></tr>
       </table>
       <script>
           function press(value)
            {
                 document.getElementById("screen").value+=value;
             }
            function clearScreen()
            {
                 document.getElementById("screen").value="";
            }
            function calculate()
            {
                  let expression=document.getElementById("screen").value;
                  document.getElementById("screen").value=eval(expression);
            }
      </script>

       </body>
</html>
